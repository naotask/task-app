<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ケアマネ予定管理</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Meiryo, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 16px;
      color: #222;
    }

    button,
    input,
    textarea {
      font-family: inherit;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      margin: 0 0 20px;
      font-size: 26px;
    }

    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 1fr);
      gap: 20px;
      align-items: start;
    }

    .calendar-area,
    .detail-area {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 14px;
      background: #fff;
    }

    .calendar-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }

    .calendar-header h2 {
      min-width: 180px;
      text-align: center;
      margin: 0;
      font-size: 22px;
    }

    button {
      border: 1px solid #9ca3af;
      background: #fff;
      border-radius: 6px;
      padding: 9px 14px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #f3f4f6;
    }

    .primary-button {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .primary-button:hover {
      background: #1d4ed8;
    }

    .danger-button {
      background: #fff;
      color: #b91c1c;
      border-color: #ef4444;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-weekdays div {
      text-align: center;
      font-weight: bold;
      padding: 8px 2px;
      background: #f9fafb;
      border-top: 1px solid #d1d5db;
      border-left: 1px solid #d1d5db;
    }

    .calendar-weekdays div:last-child {
      border-right: 1px solid #d1d5db;
    }

    .calendar-weekdays .sunday {
      color: #dc2626;
    }

    .calendar-weekdays .saturday {
      color: #2563eb;
    }

    .calendar-day {
      min-height: 112px;
      border-top: 1px solid #d1d5db;
      border-left: 1px solid #d1d5db;
      padding: 6px;
      background: white;
      overflow: hidden;
      cursor: pointer;
    }

    .calendar-day:nth-child(7n) {
      border-right: 1px solid #d1d5db;
    }

    .calendar-day:nth-last-child(-n + 7) {
      border-bottom: 1px solid #d1d5db;
    }

    .calendar-day:hover {
      background: #f8fafc;
    }

    .calendar-day.other-month {
      background: #f3f4f6;
      color: #9ca3af;
    }

    .calendar-day.selected {
      outline: 3px solid #60a5fa;
      outline-offset: -3px;
      background: #eff6ff;
    }

    .calendar-day.today .day-number {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
    }

    .day-number {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .sunday-cell .day-number {
      color: #dc2626;
    }

    .saturday-cell .day-number {
      color: #2563eb;
    }

    .holiday-cell .day-number {
      color: #dc2626;
    }

    .holiday-name {
      font-size: 10px;
      color: #dc2626;
      line-height: 1.2;
      margin: -1px 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .today.sunday-cell .day-number,
    .today.saturday-cell .day-number,
    .today.holiday-cell .day-number {
      color: white;
    }

    .schedule-preview {
      font-size: 12px;
      margin-top: 3px;
      padding: 3px 5px;
      border-radius: 4px;
      background: #dbeafe;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .schedule-preview.incomplete {
      background: #ffedd5;
      border-left: 4px solid #f97316;
    }

    .schedule-preview.complete {
      background: #dcfce7;
      border-left: 4px solid #22c55e;
    }

    .more-text {
      font-size: 11px;
      margin-top: 4px;
      color: #6b7280;
    }

    .selected-date-title {
      margin: 0 0 14px;
      font-size: 21px;
      border-bottom: 2px solid #dbeafe;
      padding-bottom: 8px;
    }

    .input-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input,
    textarea {
      width: 100%;
      padding: 9px;
      border: 1px solid #9ca3af;
      border-radius: 5px;
      font-size: 16px;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    .checklist {
      border: 1px solid #d1d5db;
      border-radius: 7px;
      padding: 10px;
      background: #f9fafb;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
    }

    .check-item input {
      width: auto;
      transform: scale(1.2);
    }

    .check-item label {
      margin: 0;
      font-weight: normal;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0;
    }

    .daily-list-title {
      margin: 18px 0 8px;
      font-size: 18px;
    }

    .daily-list {
      list-style: none;
      padding: 0;
      margin: 0;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      min-height: 90px;
      overflow: hidden;
    }

    .daily-list li {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
      background: white;
    }

    .daily-list li:last-child {
      border-bottom: none;
    }

    .daily-list li:hover {
      background: #f9fafb;
    }

    .daily-list li.selected-item {
      background: #dbeafe;
    }

    .daily-list .empty-message {
      color: #6b7280;
      text-align: center;
      cursor: default;
    }

    .schedule-main {
      font-weight: bold;
    }

    .schedule-sub {
      color: #4b5563;
      font-size: 13px;
      margin-top: 3px;
    }

    .status-label {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: normal;
    }

    .status-label.complete {
      background: #dcfce7;
      color: #166534;
    }

    .status-label.incomplete {
      background: #ffedd5;
      color: #9a3412;
    }

    .help-text {
      font-size: 13px;
      color: #6b7280;
      margin: 6px 0 0;
    }

    @media (max-width: 850px) {
      body {
        padding: 8px;
      }

      .app {
        padding: 12px;
      }

      .main-layout {
        grid-template-columns: 1fr;
      }

      .calendar-day {
        min-height: 85px;
        padding: 4px;
      }

      .schedule-preview {
        font-size: 10px;
      }
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 21px;
      }

      .calendar-header {
        gap: 6px;
      }

      .calendar-header h2 {
        min-width: 130px;
        font-size: 18px;
      }

      .calendar-header button {
        padding: 7px 9px;
      }

      .calendar-day {
        min-height: 68px;
      }

      .schedule-preview {
        padding: 2px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>ケアマネ予定管理</h1>

    <div class="main-layout">
      <section class="calendar-area">
        <div class="calendar-header">
          <button type="button" onclick="changeMonth(-1)">前月</button>
          <h2 id="monthTitle"></h2>
          <button type="button" onclick="changeMonth(1)">次月</button>
          <button type="button" onclick="goToday()">今日</button>
        </div>

        <div class="calendar-weekdays">
          <div class="sunday">日</div>
          <div>月</div>
          <div>火</div>
          <div>水</div>
          <div>木</div>
          <div>金</div>
          <div class="saturday">土</div>
        </div>

        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section class="detail-area">
        <h2 id="selectedDateTitle" class="selected-date-title">日付を選んでください</h2>

        <div class="input-group">
          <label for="timeInput">時間</label>
          <input type="time" id="timeInput">
        </div>

        <div class="input-group">
          <label for="clientInput">利用者名</label>
          <input type="text" id="clientInput" placeholder="例：山田様">
        </div>

        <div class="input-group">
          <label for="scheduleInput">予定内容</label>
          <input type="text" id="scheduleInput" placeholder="例：モニタリング訪問">
        </div>

        <div class="input-group">
          <label for="memoInput">メモ</label>
          <textarea id="memoInput" placeholder="確認事項や連絡内容を入力"></textarea>
        </div>

        <div class="input-group">
          <label>書類チェック</label>
          <div class="checklist">
            <div class="check-item">
              <input type="checkbox" id="checkMonitoring">
              <label for="checkMonitoring">モニタリング表</label>
            </div>

            <div class="check-item">
              <input type="checkbox" id="checkProgress">
              <label for="checkProgress">支援経過記録</label>
            </div>

            <div class="check-item">
              <input type="checkbox" id="checkServicePlan">
              <label for="checkServicePlan">サービス利用票</label>
            </div>

            <div class="check-item">
              <input type="checkbox" id="checkProvision">
              <label for="checkProvision">提供票</label>
            </div>

            <div class="check-item">
              <input type="checkbox" id="checkMeeting">
              <label for="checkMeeting">担当者会議記録</label>
            </div>
          </div>
        </div>

        <div class="button-row">
          <button type="button" class="primary-button" onclick="saveSchedule()">予定を保存</button>
          <button type="button" onclick="clearForm()">新規入力</button>
          <button type="button" class="danger-button" onclick="deleteSchedule()">選択した予定を削除</button>
        </div>

        <p class="help-text">下の予定をクリックすると、内容を修正できます。</p>

        <h3 class="daily-list-title">この日の予定</h3>
        <ul id="dailyScheduleList" class="daily-list"></ul>
      </section>
    </div>
  </div>

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseDate(dateText) {
      const [year, month, day] = dateText.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatJapaneseDate(dateText) {
      const date = parseDate(dateText);
      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];

      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日（${weekdays[date.getDay()]}）`;

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(schedules));
    }

    function migrateOldTasks() {
      if (schedules.length > 0) {
        return;
      }

      const oldTasks = JSON.parse(localStorage.getItem("tasksData")) || [];

      if (oldTasks.length === 0) {
        return;
      }

      schedules = oldTasks.map(task => ({
        id: task.id || createId(),
        date: String(task.date || "").replace(/\//g, "-"),
        time: task.time || "",
        client: "",
        content: task.content || "",
        memo: task.completed ? "旧タスクアプリで完了済み" : "",
        checks: {
          monitoring: false,
          progress: false,
          servicePlan: false,
          provision: false,
          meeting: false
        }
      }));

      saveData();
    }

      const todayText = formatDate(new Date());

      for (let i = 0; i < 42; i++) {
        const cellDate = new Date(startDate);
        cellDate.setDate(startDate.getDate() + i);

        const dateText = formatDate(cellDate);
        const cell = document.createElement("div");
        cell.className = "calendar-day";

        if (cellDate.getMonth() !== month) {
          cell.classList.add("other-month");
        }

        if (dateText === selectedDate) {
          cell.classList.add("selected");
        }

        if (dateText === todayText) {
          cell.classList.add("today");
        }

        if (cellDate.getDay() === 0) {
          cell.classList.add("sunday-cell");
        }

        if (cellDate.getDay() === 6) {
          cell.classList.add("saturday-cell");
        }

        const holidayName = JAPAN_HOLIDAYS[dateText] || "";

        if (holidayName) {
          cell.classList.add("holiday-cell");
          cell.title = holidayName;
        }

        const dayNumber = document.createElement("div");
        dayNumber.className = "day-number";
        dayNumber.textContent = cellDate.getDate();
        cell.appendChild(dayNumber);

        if (holidayName) {
          const holidayLabel = document.createElement("div");
          holidayLabel.className = "holiday-name";
          holidayLabel.textContent = holidayName;
          cell.appendChild(holidayLabel);
        }

        const daySchedules = schedules
          .filter(item => item.date === dateText)
          .sort(compareSchedules);

        daySchedules.slice(0, 3).forEach(schedule => {
          const preview = document.createElement("div");
          const allChecked = areAllChecksComplete(schedule.checks);

          preview.className =
            "schedule-preview " + (allChecked ? "complete" : "incomplete");

          const clientText = schedule.client ? `${schedule.client} ` : "";
          preview.textContent =
            `${schedule.time || "--:--"} ${clientText}${schedule.content}`;

          cell.appendChild(preview);
        });

        if (daySchedules.length > 3) {
          const more = document.createElement("div");
          more.className = "more-text";
          more.textContent = `ほか${daySchedules.length - 3}件`;
          cell.appendChild(more);
        }

        cell.addEventListener("click", () => selectDate(dateText));
        grid.appendChild(cell);
      }
    }

    function renderSelectedDate() {
      document.getElementById("selectedDateTitle").textContent =
        formatJapaneseDate(selectedDate);

      renderDailyList();
    }

    function renderDailyList() {
      const list = document.getElementById("dailyScheduleList");
      list.innerHTML = "";

      const daySchedules = schedules
        .filter(item => item.date === selectedDate)
        .sort(compareSchedules);

      if (daySchedules.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty-message";
        empty.textContent = "予定はありません";
        list.appendChild(empty);
        return;
      }

      daySchedules.forEach(schedule => {
        const li = document.createElement("li");

        if (schedule.id === selectedListId) {
          li.classList.add("selected-item");
        }

        const main = document.createElement("div");
        main.className = "schedule-main";

        const status = document.createElement("span");
        const allChecked = areAllChecksComplete(schedule.checks);
        status.className =
          "status-label " + (allChecked ? "complete" : "incomplete");
        status.textContent = allChecked ? "書類完了" : "書類未完了";

        const clientText = schedule.client ? ` ${schedule.client}` : "";
        main.textContent = `${schedule.time || "--:--"}${clientText}　${schedule.content}`;
        main.appendChild(status);

        li.appendChild(main);

        if (schedule.memo) {
          const sub = document.createElement("div");
          sub.className = "schedule-sub";
          sub.textContent = schedule.memo;
          li.appendChild(sub);
        }

        li.addEventListener("click", () => loadSchedule(schedule.id));
        list.appendChild(li);
      });
    }

    function compareSchedules(a, b) {
      return `${a.date} ${a.time || ""}`.localeCompare(
        `${b.date} ${b.time || ""}`
      );
    }

    function areAllChecksComplete(checks) {
      if (!checks) {
        return false;
      }

      return (
        checks.monitoring &&
        checks.progress &&
        checks.servicePlan &&
        checks.provision &&
        checks.meeting
      );
    }

    function getChecksFromForm() {
      return {
        monitoring: document.getElementById("checkMonitoring").checked,
        progress: document.getElementById("checkProgress").checked,
        servicePlan: document.getElementById("checkServicePlan").checked,
        provision: document.getElementById("checkProvision").checked,
        meeting: document.getElementById("checkMeeting").checked
      };
    }

    function setChecksToForm(checks) {
      checks = checks || {};

      document.getElementById("checkMonitoring").checked =
        Boolean(checks.monitoring);

      document.getElementById("checkProgress").checked =
        Boolean(checks.progress);

      document.getElementById("checkServicePlan").checked =
        Boolean(checks.servicePlan);

      document.getElementById("checkProvision").checked =
        Boolean(checks.provision);

      document.getElementById("checkMeeting").checked =
        Boolean(checks.meeting);
    }

    function saveSchedule() {
      const time = document.getElementById("timeInput").value;
      const client = document.getElementById("clientInput").value.trim();
      const content = document.getElementById("scheduleInput").value.trim();
      const memo = document.getElementById("memoInput").value.trim();

      if (!selectedDate) {
        alert("カレンダーの日付を選んでください");
        return;
      }

      if (!time) {
        alert("時間を入力してください");
        return;
      }

      if (!content) {
        alert("予定内容を入力してください");
        return;
      }

      const scheduleData = {
        date: selectedDate,
        time,
        client,
        content,
        memo,
        checks: getChecksFromForm()
      };

      if (editingId) {
        const index = schedules.findIndex(item => item.id === editingId);

        if (index !== -1) {
          schedules[index] = {
            ...schedules[index],
            ...scheduleData
          };
        }
      } else {
        schedules.push({
          id: createId(),
          ...scheduleData
        });
      }

      schedules.sort(compareSchedules);
      saveData();

      editingId = null;
      selectedListId = null;
      clearFormFields();
      renderCalendar();
      renderDailyList();
    }

    function loadSchedule(id) {
      const schedule = schedules.find(item => item.id === id);

      if (!schedule) {
        return;
      }

      editingId = id;
      selectedListId = id;

      document.getElementById("timeInput").value = schedule.time || "";
      document.getElementById("clientInput").value = schedule.client || "";
      document.getElementById("scheduleInput").value = schedule.content || "";
      document.getElementById("memoInput").value = schedule.memo || "";
      setChecksToForm(schedule.checks);

      renderDailyList();
    }

    function deleteSchedule() {
      if (!editingId) {
        alert("削除する予定を、下の一覧から選んでください");
        return;
      }

      const schedule = schedules.find(item => item.id === editingId);

      if (!schedule) {
        return;
      }

      const message =
        `${schedule.time} ${schedule.client || ""} ${schedule.content}\n` +
        "この予定を削除しますか？";

      if (!confirm(message)) {
        return;
      }

      schedules = schedules.filter(item => item.id !== editingId);
      saveData();

      editingId = null;
      selectedListId = null;
      clearFormFields();
      renderCalendar();
      renderDailyList();
    }

    function clearForm() {
      editingId = null;
      selectedListId = null;
      clearFormFields();
      renderDailyList();
    }

    function clearFormFields() {
      document.getElementById("timeInput").value = "";
      document.getElementById("clientInput").value = "";
      document.getElementById("scheduleInput").value = "";
      document.getElementById("memoInput").value = "";
      setChecksToForm({});
    }

    migrateOldTasks();
    renderCalendar();
    renderSelectedDate();
  </script>
</body>
</html>
